services:
  watchtower:
    image: containrrr/watchtower
    command: --interval 600 --scope vista
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  vista:
    image: lcas.lincoln.ac.uk/lcas/vista:v1.0.0
    labels:
      - "com.centurylinklabs.watchtower.scope=vista"
    restart: unless-stopped
    container_name: vista
    depends_on:
      - orion-v2
    networks:
      - default
    env_file:
      - .env
    # Remove the port mapping here. Caddy will access it internally on port 5000.
    ports:
      - "${VISTA_PORT}:5000" # localhost:5000

  # Add Caddy service
  caddy:
    image: caddy/caddy:latest
    restart: unless-stopped
    container_name: caddy
    ports:
      - "80:80"   # HTTP for ACME challenges and redirection
      - "443:443" # HTTPS
      - "2019:2019" # Caddy API
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile # Your Caddy configuration
      - caddy_data:/data                 # Persistent storage for Caddy (certificates, etc.)
    depends_on:
      - vista # Caddy depends on vista being up
    networks:
      - default

  # Orion is an NGSI-v2 context broker
  orion-v2:
    image: quay.io/fiware/orion:${ORION_VERSION}
    restart: unless-stopped
    hostname: orion
    container_name: fiware-orion
    depends_on:
      - mongo-db
    networks:
      - default
    expose:
      - "${ORION_PORT}"
    ports:
      - "${ORION_PORT}:${ORION_PORT}" # localhost:1026
    # see https://github.com/telefonicaid/fiware-orion/issues/3166
    entrypoint: ["sh", "-c", "rm -f /tmp/contextBroker.pid; /usr/bin/contextBroker -fg -multiservice -ngsiv1Autocast -disableFileLog -dbhost mongo-db -logLevel DEBUG"]
    #command: -dbhost mongo-db -logLevel DEBUG
    healthcheck:
      test: curl --fail -s http://orion:${ORION_PORT}/version || exit 1

  # Cygnus is configured to persist to STH-Comet
  cygnus:
    image: quay.io/fiware/cygnus-ngsi:${CYGNUS_VERSION}
    restart: unless-stopped
    hostname: cygnus
    container_name: fiware-cygnus
    depends_on:
      - mongo-db
    networks:
      - default
    expose:
      - "${CYGNUS_API_PORT}"
      - "${CYGNUS_MONGO_SERVICE_PORT}"
    ports:
      - "${CYGNUS_MONGO_SERVICE_PORT}:${CYGNUS_MONGO_SERVICE_PORT}" # localhost:5051
      - "${CYGNUS_API_PORT}:${CYGNUS_API_PORT}" # localhost:5080
    environment:
      - "CYGNUS_MONGO_SERVICE_PORT=${CYGNUS_MONGO_SERVICE_PORT}" # Port that Cygnus listens on for operational reasons
      - "CYGNUS_MONGO_HOSTS=mongo-db:${MONGO_DB_PORT}" # Comma separated list of Mongo-DB servers which Cygnus will contact to persist historical context data
      - "CYGNUS_SERVICE_PORT=${CYGNUS_MONGO_SERVICE_PORT}"
      - "CYGNUS_API_PORT=${CYGNUS_API_PORT}" # Port that Cygnus listens on for operational reasons
      - "CYGNUS_LOG_LEVEL=DEBUG" # The logging level for Cygnus
    healthcheck:
      test: curl --fail -s http://cygnus:${CYGNUS_API_PORT}/v1/version || exit 1

  # STH-Comet is persisting Short Term History to Mongo-DB
  sth-comet:
    image: quay.io/fiware/sth-comet:${STH_COMET_VERSION}
    restart: unless-stopped
    hostname: sth-comet
    container_name: fiware-sth-comet
    depends_on:
      - cygnus
      - mongo-db
    networks:
      - default
    ports:
      - "${STH_COMET_PORT}:${STH_COMET_PORT}" # localhost:8666
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=${STH_COMET_PORT}
      - DB_PREFIX=sth_
      - DB_URI=mongo-db:${MONGO_DB_PORT}
      - LOGOPS_LEVEL=DEBUG
    healthcheck:
      test: curl --fail -s http://sth-comet:${STH_COMET_PORT}/version || exit 1

# Database
  mongo-db:
    image: mongo:${MONGO_DB_VERSION}
    restart: unless-stopped
    hostname: mongo-db
    container_name: db-mongo
    expose:
      - "${MONGO_DB_PORT}"
    ports:
      - "${MONGO_DB_PORT}:${MONGO_DB_PORT}" # localhost:27017
    networks:
      - default
    volumes:
      - vista-mongo-db:/data
    healthcheck:
      test: ["CMD","mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  default:

volumes:
  vista-mongo-db:
  caddy_data: # Define the volume for Caddy's data